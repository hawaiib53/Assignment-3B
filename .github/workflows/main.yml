name: AQI Discord Alert

on:
  schedule:
    # Runs every 30 minutes; the bot's own rate limit keeps Discord
    # posts to at most one per hour.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

jobs:
  check-aqi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore alert state
        uses: actions/cache/restore@v6
        with:
          path: state
          key: aqi-alert-state-${{ github.run_id }}
          restore-keys: |
            aqi-alert-state-

      - name: Check AQI and post update
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ZIP_CODE: ${{ vars.ZIP_CODE }}
        run: python aqi_alert_bot.py

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v6
        with:
          path: state
          key: aqi-alert-state-${{ github.run_id }}
